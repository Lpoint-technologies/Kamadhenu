<!DOCTYPE html>
<html>
<head>
  <title>Geo-Fencing for Child Safety</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    #map { height: 90vh; width: 100%; }
    body { font-family: Arial; margin: 0; padding: 0; }
    button { margin: 10px; padding: 10px; }
    #debug-info { margin: 10px; padding: 10px; background: #f0f0f0; display: none; }
  </style>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4mPe3FtRIfwj1ETkH3toZV89qUaU_iPc&libraries=drawing"></script>
</head>
<body>
  <h2 style="text-align:center;">Draw Safe Zone for Cow: <span id="cow-id-display">{{ cow['cow_id'] }}</span></h2>
  <div id="map"></div>
  <button onclick="saveFence()">Save Fence</button>
  <div id="debug-info"></div>

  <script>
    let map, drawingManager, selectedShape;
    
    // Debug - check if cow_id is being passed correctly
    const cow_id = "{{ cow['cow_id'] }}";
    console.log("Cow ID from template:", cow_id);
    
    // Display debug info on page
    document.getElementById('cow-id-display').textContent = cow_id;

    function initMap() {
      console.log("Initializing map...");
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 12.9716, lng: 77.5946 },
        zoom: 13
      });

      drawingManager = new google.maps.drawing.DrawingManager({
        drawingMode: google.maps.drawing.OverlayType.POLYGON,
        drawingControl: true,
        drawingControlOptions: {
          position: google.maps.ControlPosition.TOP_CENTER,
          drawingModes: ["polygon"]
        },
        polygonOptions: {
          editable: true
        }
      });

      drawingManager.setMap(map);

      google.maps.event.addListener(drawingManager, 'overlaycomplete', function(event) {
        console.log("Polygon drawn!");
        if (selectedShape) {
          selectedShape.setMap(null);
        }
        selectedShape = event.overlay;
        console.log("Shape saved, ready to save fence");
      });
    }

    function saveFence() {
  console.log("Save Fence button clicked");
  console.log("Current cow_id:", cow_id);
  
  if (!cow_id || cow_id === "None" || cow_id === "") {
    alert("Error: Cow ID is missing!");
    return;
  }
  
  if (!selectedShape) {
    alert("Please draw a geofence first.");
    return;
  }

  const path = selectedShape.getPath();
  const coordinates = [];

  for (let i = 0; i < path.getLength(); i++) {
    const point = path.getAt(i);
    coordinates.push([point.lat(), point.lng()]);
  }
  
  console.log("Coordinates collected:", coordinates);
  console.log("Sending to server...");

  fetch('/save-fence', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      cow_id: cow_id, 
      coordinates: coordinates 
    })
  })
  .then(response => {
    console.log("Response status:", response.status);
    return response.json();
  })
  .then(data => {
    console.log("Response data:", data);
    if (data.status === "success") {
      alert("✅ " + data.message);
    } else {
      alert("❌ Error: " + (data.message || "Unknown error"));
    }
  })
  .catch(error => {
    console.error("Fetch error:", error);
    alert("Error saving fence: " + error.message);
  });
}

    window.onload = initMap;
  </script>
</body>
</html>
